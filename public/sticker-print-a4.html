<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>KnottyVibes Stickers — A4 Print Sheet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-family: Georgia, serif;
      gap: 16px;
    }

    .instructions {
      background: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      text-align: center;
    }
    .instructions strong { color: #c4704f; }

    /* A4 sheet simulation on screen */
    .a4-sheet {
      width: 210mm;
      min-height: 297mm;
      background: white;
      padding: 8mm;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(5, auto);
      gap: 5mm;
      align-content: start;
    }

    .sticker-wrap {
      width: 100%;
      position: relative;
    }

    .sticker-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Cut lines */
    .sticker-wrap::after {
      content: '';
      position: absolute;
      inset: -2mm;
      border: 0.3mm dashed #bbb;
      border-radius: 5mm;
      pointer-events: none;
    }

    @media print {
      body {
        background: white;
        padding: 0;
        display: block;
      }
      .instructions { display: none; }
      .a4-sheet {
        width: 100%;
        min-height: auto;
        padding: 8mm;
        box-shadow: none;
        page-break-after: always;
      }
      .sticker-wrap::after {
        border-color: #ccc;
      }
    }
  </style>
</head>
<body>

  <div class="instructions">
    Press <strong>Ctrl+P</strong> &nbsp;→&nbsp; Paper size: <strong>A4</strong> &nbsp;→&nbsp; Margins: <strong>None</strong> &nbsp;→&nbsp; Print
    &nbsp;&nbsp;|&nbsp;&nbsp; Dashed lines = cut guides &nbsp;&nbsp;|&nbsp;&nbsp; <strong>10 stickers per sheet</strong>
  </div>
