<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>KnottyVibes Sticker</title>
  <style>
    body { background: #d9cfc4; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Georgia, serif; gap: 32px; }
    h2 { color: #4a2e16; margin: 0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>
  <h2>Sticker Preview</h2>

  <!-- RECTANGULAR STICKER -->
  <svg xmlns="http://www.w3.org/2000/svg" width="480" height="260" viewBox="0 0 480 260">
    <!-- Pastel gradient background -->
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#fdf3ec"/>
        <stop offset="100%" style="stop-color:#fae8d8"/>
      </linearGradient>
    </defs>
    <rect width="480" height="260" rx="22" fill="url(#bg)"/>
    <!-- Border -->
    <rect x="3" y="3" width="474" height="254" rx="20" fill="none" stroke="#c4704f" stroke-width="2.5"/>
    <!-- Inner dashed border -->
    <rect x="11" y="11" width="458" height="238" rx="14" fill="none" stroke="#c4704f" stroke-width="1" stroke-dasharray="5 4"/>

    <!-- Yarn ball (left) -->
    <circle cx="100" cy="128" r="56" fill="#c4704f" opacity="0.10"/>
    <circle cx="100" cy="128" r="56" stroke="#c4704f" stroke-width="2.5" fill="none"/>
    <path d="M47 110 Q100 102 153 112" stroke="#c4704f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M44 128 Q100 120 156 128" stroke="#c4704f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M47 146 Q100 138 153 147" stroke="#c4704f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M78 73 Q83 128 79 183" stroke="#8b6245" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M100 72 Q104 128 100 184" stroke="#8b6245" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M122 73 Q117 128 121 183" stroke="#8b6245" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Loose thread -->
    <path d="M150 98 Q166 84 163 100 Q160 114 174 108" stroke="#c4704f" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <!-- Divider line left -->
    <line x1="176" y1="30" x2="176" y2="230" stroke="#c4704f" stroke-width="0.8" opacity="0.3"/>

    <!-- Text block -->
    <text x="202" y="82" font-family="Georgia,serif" font-size="36" font-weight="700" fill="#4a2e16" letter-spacing="0.5">KnottyVibes</text>
    <text x="204" y="112" font-family="Georgia,serif" font-size="15" font-style="italic" fill="#c4704f" letter-spacing="0.3">Made slow, made meaningful</text>

    <!-- Divider -->
    <line x1="200" y1="130" x2="458" y2="130" stroke="#c4704f" stroke-width="0.8" opacity="0.4"/>

    <!-- Contact details -->
    <text x="200" y="158" font-family="Georgia,serif" font-size="13.5" fill="#8b6245" letter-spacing="0.5">🌐  www.knottyvibes.art</text>
    <text x="200" y="182" font-family="Georgia,serif" font-size="13.5" fill="#8b6245" letter-spacing="0.5">✉  knottyvibes74@gmail.com</text>

    <!-- Divider -->
    <line x1="200" y1="200" x2="458" y2="200" stroke="#c4704f" stroke-width="0.8" opacity="0.4"/>

    <!-- Bottom tagline -->
    <text x="200" y="224" font-family="Georgia,serif" font-size="11" fill="#c4704f" letter-spacing="2.5">HANDCRAFTED WITH LOVE  ✦  INDIA</text>
  </svg>

  <p style="color:#8b6245;font-size:13px;margin:0;letter-spacing:1px">Print-ready SVG — scalable to any sticker size</p>
</body>
</html>
